services:
  gateway:
    image: nginx:1.30.1-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
    networks:
      - app

  frontend:
    build:
      context: ./frontend
    networks:
      - app

networks:
  app:
